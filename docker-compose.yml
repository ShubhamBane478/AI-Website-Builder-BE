services:
  postgres:
    image: postgres:15
    container_name: siteforge_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - siteforge_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: shubhambane478/siteforge-backend:latest
    container_name: siteforge_backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override DB_URL so the backend reaches postgres via Docker network (not localhost)
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}?TimeZone=UTC
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  siteforge_data:
