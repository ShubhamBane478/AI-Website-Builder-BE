services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      CORS_ALLOWED_ORIGINS: http://localhost
      DOCKER_ENV: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ../AI-Website-Builder-FE
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
