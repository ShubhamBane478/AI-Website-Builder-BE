spring:
  application:
    name: aiwebsitebuilder

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/siteforge_dev?TimeZone=UTC}
    username: ${DB_USERNAME:siteforge}
    password: ${DB_PASSWORD:localpassword}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-change-this-before-production}
  expiry-ms: ${JWT_EXPIRY_MS:900000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
